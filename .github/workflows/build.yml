name: Build Electron App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: npm run dist

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: MapApp-Windows
          path: dist/MapAppSetup-*.exe