name: Build Electron App

on:
  push:
    branches: [ main ]

jobs:
  # ======================================================
  # Build Windows
  # ======================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - run: npm install

      # Rebuild native modules
      - run: npx electron-rebuild -f -w better-sqlite3

      # Dist con icona .ico (specificata in package.json / build config)
      - run: npm run dist -- --win

      # Upload artifact
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapApp-Windows
          path: dist/MapAppSetup-*.exe

  # ======================================================
  # Build Mac
  # ======================================================
  build-mac:
    name: Build Mac
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - run: npm install

      - run: npx electron-rebuild -f -w better-sqlite3

      # Dist con icona .icns
      - run: npm run dist -- --mac

      # Upload artifact DMG specifico Mac
      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapApp-Mac
          path: dist/*.dmg